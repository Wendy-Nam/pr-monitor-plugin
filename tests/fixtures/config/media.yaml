# gen-pr-monitor.py DOMAIN_TO_NAME (line 160-170)
# 도메인 → 한국어 매체명 매핑 (PR 모니터 전용, source_name 정규화에 사용)
#
# NOTE: format.py 는 config/media-mapping.yaml 에서 별도 매핑을 로드한다 (load_media_mapping(), line 306-323).
# 해당 파일은 현재 프로젝트 어디에도 존재하지 않으며 (find 결과 없음), format.py 는 파일 부재 시
# graceful fallback (빈 dict)으로 동작한다.
# 따라서 gen-pr-monitor.py DOMAIN_TO_NAME 과 format.py config/media-mapping.yaml 은 현재 별개 경로이며,
# format.py 쪽 매핑은 미정의 상태다. 이 파일의 domain_to_name 이 두 용도의 단일 출처가 되어야 한다.
domain_to_name:
  "tistory.com": "티스토리(블로그)"      # 수집 단계에서 제외되나 잔존 시 라벨
  "irobotnews.com": "로봇신문"
  "irobot.co.kr": "로봇신문"
  "v.daum.net": "다음 뉴스"
  "n.news.naver.com": "네이버 뉴스"
  "news.naver.com": "네이버 뉴스"
  "bloomingbit.io": "bloomingbit"
  "kedglobal.com": "KED Global"
  "thelec.net": "The Elec"
