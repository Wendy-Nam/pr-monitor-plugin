# 도메인팩 — 출력 스타일/톤 규칙 (단일 출처)
#
# 톤 블랙리스트는 현재 CLAUDE.md · insight-synthesizer.md · format.py 세 곳에 중복돼 있다.
# 이 파일이 유일한 출처가 된다. 엔진(format.py 검증기, 합성 프롬프트)은 여기서 읽는다.
# /setup 이 조직·언어별로 생성. 아래는 테스트 픽스처 (가상 Acme Robotics, 한국어).

language: ko
sentence_max: 60                # 한국어 문장 최대 길이 (_KOREAN_SENTENCE_MAX). 영문·숫자·통화 토큰 제외하고 카운트.

newsletter_title: "산업군 인사이트 뉴스레터"
pr_title: "마케팅 PR 클리핑"

# 본문 금지 — 비유·추상어·버즈워드 (format.py _TONE_BLACKLIST 와 정확히 일치 = 코드 강제 목록)
tone_blacklist:
  - 기울기
  - 체인
  - 프레임
  - 전환점
  - 변곡점
  - 모멘텀
  - 신호
  - 시그널
  - 가시화
  - 내러티브
  - 서사
  - 양산 궤도
  - 레퍼런스 확보
  - 관전 포인트
  - 정착 중
  - 확산 중
  - 대외 가시성
  - 데이터 플라이휠
  - 생태계 구축
  - 패러다임
  - 내재화 수준
  - 경쟁 심화
  - 추세 가속
  - 흐름 확산

# 금지 문장 어미 — 근거 없는 예측/단정/모호 (_BANNED_ENDINGS)
banned_endings:
  - 해야 한다
  - 기대된다
  - 전망된다
  - 경로가 열렸다
  - 혜택을 받는다
  - 확인 필요
  - 검토 필요
  - 대비 필요
