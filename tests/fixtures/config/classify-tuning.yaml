# classify.py calc_relevance() _expo_patterns (line 267)
# 전시회/박람회 단순 참가 기사 — 경쟁사 언급 없으면 relevance 감점
expo_patterns:
  - "STK"
  - "로보테크쇼"
  - "코마텍"
  - "엑스포"
  - "박람회"

# classify.py samsung_boost() + _SAMSUNG_APPLIANCE_NOISE (line 219-230)
# 삼성전자(최대주주 지분 35%) 로봇 분야 언급은 자사 직접 이해관계 → +2 가중치
# 단, 가전 노이즈 키워드가 제목에 있으면 부스트 무효
stakeholder_boosts:
  - match: ["삼성", "samsung"]   # samsung_boost() 트리거 (line 226-227)
    weight: 2
    noise_terms:                 # _SAMSUNG_APPLIANCE_NOISE (line 219-220)
      - "로봇청소기"
      - "로청"
      - "비스포크"
      - "가전"
      - "세탁기"
      - "냉장고"
      - "청소기"
      - "에어컨"
      - "tv"
      - "스마트폰"
      - "갤럭시"

# aggregate.py _LOW_SIGNAL_TITLE_PATTERNS (line 74)
# 전시회 부스참가·시장보고서 PR 등 — 경쟁사 언급 없으면 tier1 부적합
low_signal_title_patterns:
  - "STK"
  - "로보테크쇼"
  - "코마텍"
  - "MarketsandMarkets"

# aggregate.py _LOW_SIGNAL_BODY_PATTERNS (line 75)
# 본문(first_paragraph) 기반 저신호 패턴
low_signal_body_patterns:
  - "감사패"
  - "참가"
