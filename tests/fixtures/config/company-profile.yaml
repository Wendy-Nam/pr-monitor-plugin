# 자사 및 경쟁 환경 프로필
# 모든 에이전트가 "자사 관점" 기준으로 참조
# 출처: 상사 공유 참고자료(제조자동화 시장 경쟁구도) + 공개 정보
# 분기별 업데이트 예정

company:
  name: "에이콤로보틱스"
  industry: "산업용 로봇 제조"
  core_products:
    - "고정형 산업용 로봇"
    - "협동로봇"
    - "휴머노이드 플랫폼"
  positioning: |
    한국 기반 로봇 제조사. 전통적으로 협동로봇 강세.
    최근 휴머노이드 플랫폼으로 확장, 삼성전자 전략적 지분 투자 이후
    B2B 제조자동화 시장에서 존재감 확대 중.

# 주요 경쟁사 (헤드라인 경쟁사별 그룹핑용)
