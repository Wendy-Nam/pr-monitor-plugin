# 뉴스레터 외부 수집·분류 키워드 (fetch-urls 1차 필터 + classify 관련성 점수)
# ※ PR 클리핑의 자사 검색은 이 파일과 무관 — gen-pr-monitor.py 가 자사명 쿼리로 직접 수집.
#    (boost 의 자사명은 외부 수집망에 걸린 자사 기사를 pr-articles 로 분리하기 위한 통과용)
# "키워드 추가해줘" / "키워드 삭제해줘" (/setup) 로 관리. 수정 → 다음 실행부터 반영.

# ============================================================
# 부스트 키워드 — 제목에 포함되면 "관련 기사"로 우선 통과
# ============================================================
boost:
  # 자사
  - "Contoso Motors"
  - "콘토소 모터스"
  - "Contoso"
  - "콘토소"

  # 경쟁사
  - "Tesla"
  - "테슬라"
  - "BYD"
  - "Rivian"
  - "Lucid"
  - "NIO"
  - "Hyundai Motor"
  - "현대차"
  - "Volkswagen"
  - "폭스바겐"
  - "Ford"
  - "GM"
  - "XPeng"
  - "샤오펑"

  # 핵심 주제
  - "전기차"
  - "EV"
  - "electric vehicle"
  - "배터리"
  - "battery"
  - "전고체"
  - "리튬"
  - "LFP"
  - "충전"
  - "charging"
  - "초급속"
  - "자율주행"
  - "ADAS"
  - "FSD"
  - "신차"
  - "라인업"

  # 충전 표준
  - "NACS"
  - "CCS"
  - "Supercharger"

  # 정책/보조금
  - "보조금"
  - "IRA"
  - "배출규제"

  # 제품/기술
  - "파워트레인"
  - "powertrain"
  - "OTA"
  - "SDV"
  - "인도량"
  - "기가팩토리"
  - "gigafactory"

# ============================================================
# 강제 제외 — 부스트보다 우선. 자사 언급이어도 drop.
# ============================================================
strong_exclude:
  - "주가"
  - "상승 마감"
  - "하락 마감"
  - "급등"
  - "급락"
  - "롤러코스터"
  - "장세"
  - "시총"
  - "매수"
  - "매도"
  - "공매도"
  - "목표주가"
  - "투자의견"
  - "MSCI 편입"
  - "지수 편입"
  - "지수 편출"
  - "전기차주"
  - "테마주"
  - "관련주"
  - "급등주"
  - "급락주"
  - "수급주"
  - "유망주"
  - "성장주"
  - "가치주"
  - "우선주"
  - "매수 추천"
  - "매도 추천"
  - "목표가"
  - "리포트 요약"
  - "어디로 튈까"   # 시장 예측 코멘터리 마커
  - "튀어 오를까"

# ============================================================
# 일반 제외 — 부스트 없을 때만 적용
# ============================================================
exclude:
  # 선거/정치
  - "후보"
  - "선거"
  - "공약"
  - "출마"
  - "대선"
  - "총선"
  - "국회의원"

  # 지방행정
  - "시장"
  - "군수"
  - "구청장"
  - "도지사"
  - "준공"
  - "취임"
  - "개소식"

  # 연예/스포츠
  - "연예"
  - "아이돌"
  - "골프"
  - "야구"
  - "축구"

  # 증권/거시
  - "코스피"
  - "코스닥"
  - "환율"
  - "비트코인"
  - "가상화폐"

# ============================================================
# 제외 예외 — "시장" 키워드가 있어도 이것과 함께면 유지
# ============================================================
exclude_exceptions:
  - "시장 동향"
  - "시장 규모"
  - "시장 점유"
  - "시장 전망"
  - "글로벌 시장"

# ============================================================
# 민감도 태깅 — 수집은 하되 수신 대상별 필터링
# ============================================================
# 마케팅 PR리스트: 전부 포함 (부정도 모니터링 필요)
# 산업군 인사이트 뉴스레터: 포함 + ⚠️ 라벨
# 전사 뉴스레터: 민감 기사 제외
sensitivity:
  legal:
    keywords: ["검찰", "소환", "기소", "수사", "압수수색", "횡령", "배임", "미공개정보", "공정위", "과징금"]
    newsletter_action: "exclude"
    pr_list_action: "include_with_label"
    executive_action: "include_with_label"

  negative:
    keywords: ["매출 감소", "적자", "반토막", "하락세", "철수", "구조조정", "리콜", "결함"]
    newsletter_action: "exclude"
    pr_list_action: "include_with_label"
    executive_action: "include_with_label"

  crisis:
    keywords: ["사고", "인명 부상", "사망", "화재", "배터리 화재", "유출"]
    newsletter_action: "exclude"
    pr_list_action: "include_with_label"
    executive_action: "include_with_label"

  market_commentary:
    keywords:
      # 한국어
      - "주가"
      - "시가총액"
      - "시총"
      - "주식"
      - "종목"
      - "배당"
      - "상장"
      - "IPO"
      - "펀드"
      - "ETF"
      - "투자자"
      - "증시"
      - "코스피"
      - "코스닥"
      # 영어
      - "Stocks Jump"
      - "Stock Price"
      - "Market Cap"
      - "stock surges"
      - "shares rise"
      - "shares fall"
      - "IPO"
      - "ETF"
      - "valuation"
    newsletter_action: "exclude"       # 전사 뉴스레터에서 제외
    pr_list_action: "include"          # 마케팅은 그냥 포함 (라벨 없이)
    executive_action: "include"        # 경영진도 그냥 포함

# ============================================================
# 도메인 차단 — 매체 자체가 저가치
# ============================================================
exclude_domains:
  - "joongangenews.com"
  - "econonews.co.kr"
  - "alphabiz.co.kr"
  - "cbci.co.kr"
