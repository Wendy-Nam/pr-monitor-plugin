# classify.py calc_relevance() _expo_patterns (line 267)
# 전시회/박람회 단순 참가 기사 — 경쟁사 언급 없으면 relevance 감점
expo_patterns:
  - "모터쇼"
  - "EV 트렌드 코리아"
  - "인터배터리"
  - "엑스포"
  - "박람회"

# classify.py stakeholder_boost() (line 219-230)
# 자사 직접 이해관계자(주요 주주·핵심 공급사 등) 로봇/EV 분야 언급은 +가중치.
# 단, 노이즈 키워드가 제목에 있으면 부스트 무효.
# 예시 도메인(콘토소 모터스)은 특정 이해관계자가 없어 빈 목록으로 둔다.
# 새 조직은 필요 시 아래 스키마로 추가:
#   - match: ["주주명", "stakeholder"]
#     weight: 2
#     noise_terms: ["무관 키워드", ...]
stakeholder_boosts: []

# aggregate.py _LOW_SIGNAL_TITLE_PATTERNS (line 74)
# 전시회 부스참가·시장보고서 PR 등 — 경쟁사 언급 없으면 tier1 부적합
low_signal_title_patterns:
  - "모터쇼"
  - "EV 트렌드 코리아"
  - "인터배터리"
  - "MarketsandMarkets"

# aggregate.py _LOW_SIGNAL_BODY_PATTERNS (line 75)
# 본문(first_paragraph) 기반 저신호 패턴
low_signal_body_patterns:
  - "감사패"
  - "참가"
